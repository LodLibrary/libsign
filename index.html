<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>יצירת כרטיסי גיל — ספרייה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Assistant', Arial, sans-serif;
  --radius: 8px;
  --ui-bg: #f4f5f7;
  --panel-bg: #ffffff;
  --border: #dde0e6;
  --accent: #2956AA;
  --accent-text: #fff;
  --danger: #d63031;
  --text: #1e2029;
  --muted: #6b7280;
}

html, body {
  font-family: var(--font);
  background: var(--ui-bg);
  color: var(--text);
  height: 100%;
  font-size: 15px;
}

/* ===== SCREEN LAYOUT ===== */
@media screen {
  .app-header {
    background: var(--accent);
    color: #fff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
  }

  .app-header h1 {
    font-size: 1.15rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .btn-print {
    background: #fff;
    color: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 8px 20px;
    font-family: var(--font);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, transform .12s;
  }
  .btn-print:hover  { background: #e8edf8; transform: translateY(-1px); }
  .btn-print:active { transform: scale(0.95); }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 52px);
  }

  /* ----- Sidebar ----- */
  .sidebar {
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-title {
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .form-group label { font-size: .85rem; font-weight: 600; }
  .form-group input,
  .form-group select {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font);
    font-size: .95rem;
    direction: rtl;
    width: 100%;
  }
  .form-group input:focus,
  .form-group select:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: var(--font);
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .15s, transform .12s;
  }
  .btn:hover  { opacity: .88; }
  .btn:active { transform: scale(0.95); }
  .btn-primary   { background: var(--accent); color: #fff; width: 100%; }
  .btn-secondary { background: #e8edf8; color: var(--accent); width: 100%; }

  .divider { border: none; border-top: 1px solid var(--border); }

  /* URL import */
  .url-import-row { display: flex; gap: 6px; }
  .url-import-row input { flex: 1; min-width: 0; }

  /* CSV upload */
  .csv-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .csv-hint { font-size: .78rem; color: var(--muted); }
  #csv-file { font-size: .85rem; }

  /* Card list */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 320px;
    overflow-y: auto;
  }

  .card-list-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: .85rem;
    animation: slideInItem .2s ease both;
    transition: background .15s, transform .15s, opacity .18s;
  }
  .card-list-item:hover { background: var(--ui-bg); }
  .card-list-item.removing { opacity: 0; transform: translateX(12px); }

  .card-list-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .card-list-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-list-series { font-weight: 700; }
  .card-list-author { color: var(--muted); }

  .btn-edit, .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    flex-shrink: 0;
    transition: color .12s, background .12s, transform .1s;
  }
  .btn-edit:hover  { color: var(--accent); background: #e8edf8; }
  .btn-del:hover   { color: var(--danger);  background: #ffeaea; }
  .btn-edit:active, .btn-del:active { transform: scale(0.82); }

  .empty-hint {
    text-align: center;
    color: var(--muted);
    font-size: .85rem;
    padding: 16px;
  }

  /* ----- Animations ----- */
  @keyframes slideInItem {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeScaleIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }
  .sign-card { animation: fadeScaleIn .25s ease both; }

  /* ----- Preview pane ----- */
  .preview-pane {
    overflow-y: auto;
    background: #888;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .a4-page {
    width: 210mm;
    min-height: 297mm;
    background: #fff;
    padding: 10mm;
    box-shadow: 0 4px 24px rgba(0,0,0,.3);
  }

  /* ----- Tab bar ----- */
  .tab-bar { display: flex; gap: 4px; }
  .tab-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    border-radius: 6px 6px 0 0;
    padding: 6px 16px;
    font-family: var(--font);
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .tab-btn.active { background: rgba(255,255,255,0.30); }
  .tab-btn:hover  { background: rgba(255,255,255,0.22); }

  /* ----- Column sign preview ----- */
  .col-preview-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
    overflow: auto;
    height: 100%;
  }
  .col-sign-scaler { transform-origin: top left; flex-shrink: 0; }
}

/* ===== A4 PAGE LAYOUT (screen + print) ===== */
.a4-page {
  display: flex;
  flex-wrap: wrap;
  align-content: start;
  column-gap: 4mm;
  row-gap: 6mm;
}

/* ===== SHARED CARD STYLES (screen + print) ===== */
.sign-card {
  display: inline-flex;
  flex-direction: column;
  min-width: 60mm;
  max-width: 250mm;
  height: 35mm;
  flex-shrink: 0;
  direction: rtl;
  print-color-adjust: exact;
  -webkit-print-color-adjust: exact;
  background: #ffffff;
  color: #2956AA;
  border: 0.5px dashed #799DDE;
}

.sign-card .fold {
  height: 7.5mm;
  flex-shrink: 0;
}

.sign-card .text-zone {
  height: 20mm;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5mm;
  white-space: nowrap;
  overflow: hidden;
  border-top: 0.5px dashed #799DDE;
  border-bottom: 0.5px dashed #799DDE;
  font-size: 20pt;
  line-height: 1;
}

.sign-card .series-name { font-weight: 600; }
.sign-card .separator   { font-weight: 400; opacity: .6; margin: 0 .15em; }
.sign-card .author-name { font-weight: 400; }

/* ===== TASA ===== */
.tasa-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
}
.tasa-opt {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid #ccc;
  cursor: pointer;
  flex-shrink: 0;
  transition: box-shadow .15s;
  padding: 0;
}
.tasa-opt[data-tasa=""] {
  background: #f0f0f0;
  color: #888;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.tasa-opt.active {
  box-shadow: 0 0 0 2px white, 0 0 0 4px var(--accent);
  border-color: transparent;
}
.sign-card .tasa-strip {
  width: 10mm;
  flex-shrink: 0;
  align-self: stretch;
  border-inline-end: 0.5px dashed #799DDE;
}
.sign-card .text-zone.tasa { padding: 0; }
.sign-card .text-content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5mm;
  overflow: hidden;
  white-space: nowrap;
}


/* ===== PRINT STYLES ===== */
@media print {
  @page { size: A4 portrait; margin: 10mm; }

  .app-header,
  .sidebar,
  .preview-pane > *:not(.a4-page) { display: none !important; }

  html, body { background: white; height: auto; }

  .layout { display: block; height: auto; }

  .preview-pane {
    background: white;
    padding: 0;
    overflow: visible;
  }

  .a4-page {
    width: 100%;
    min-height: auto;
    box-shadow: none;
    padding: 0;
    page-break-after: always;
  }

  .a4-page:last-child { page-break-after: avoid; }

  .sign-card {
    break-inside: avoid;
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }

  /* ----- Tab-aware print visibility ----- */
  body[data-tab="age"]     #preview-columns { display: none !important; }
  body[data-tab="columns"] #preview-pane    { display: none !important; }
  body[data-tab="columns"] .col-preview-wrapper { padding: 0 !important; }
  body[data-tab="columns"] .col-sign-scaler {
    transform: scale(0.642) !important;
    transform-origin: top left !important;
    margin-bottom: -426px !important;
  }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="app-header">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-age"     onclick="switchTab('age')">כרטיסי גיל</button>
    <button class="tab-btn"        id="tab-columns" onclick="switchTab('columns')">שלטי עמודות</button>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn-print" onclick="handlePrint()">🖨 הדפס</button>
    <button class="btn-print btn-pdf" id="btn-pdf" onclick="handlePDF()">📄 שמור PDF</button>
  </div>
</header>

<!-- ===== LAYOUT ===== -->
<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">

    <!-- Panel: age cards (existing) -->
    <div id="panel-age">

      <!-- Add card form -->
      <div>
        <div class="section-title" id="form-title">הוסף כרטיס</div>
        <div class="form-group">
          <label for="inp-series">שם הסדרה / הספר</label>
          <input id="inp-series" type="text" placeholder="למשל: הארי פוטר" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label for="inp-author">שם המחבר/ת</label>
          <input id="inp-author" type="text" placeholder="למשל: ג'יי.קיי. רולינג" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label for="inp-dir">כיוון טקסט</label>
          <select id="inp-dir">
            <option value="rtl">עברית ← (ימין לשמאל)</option>
            <option value="ltr">English → (Left to Right)</option>
          </select>
        </div>
        <div class="form-group">
          <label>טסה</label>
          <div class="tasa-picker" id="tasa-picker">
            <button class="tasa-opt active" data-tasa="" title="ללא טסה" onclick="setTasa(this)">✕</button>
            <button class="tasa-opt" data-tasa="#7B3F00" style="background:#7B3F00" title="חום" onclick="setTasa(this)"></button>
            <button class="tasa-opt" data-tasa="#E91E8C" style="background:#E91E8C" title="ורוד" onclick="setTasa(this)"></button>
            <button class="tasa-opt" data-tasa="#7B2FBE" style="background:#7B2FBE" title="סגול" onclick="setTasa(this)"></button>
            <button class="tasa-opt" data-tasa="#FFFFFF" style="background:#FFFFFF" title="לבן" onclick="setTasa(this)"></button>
            <button class="tasa-opt" data-tasa="#1565C0" style="background:#1565C0" title="כחול" onclick="setTasa(this)"></button>
            <button class="tasa-opt" data-tasa="#E65100" style="background:#E65100" title="כתום" onclick="setTasa(this)"></button>
            <button class="tasa-opt" data-tasa="#C62828" style="background:#C62828" title="אדום" onclick="setTasa(this)"></button>
            <button class="tasa-opt" data-tasa="#2E7D32" style="background:#2E7D32" title="ירוק" onclick="setTasa(this)"></button>
            <button class="tasa-opt" data-tasa="#F9A825" style="background:#F9A825" title="צהוב" onclick="setTasa(this)"></button>
            <button class="tasa-opt" data-tasa="#212121" style="background:#212121" title="שחור" onclick="setTasa(this)"></button>
            <button class="tasa-opt" data-tasa="#9E9E9E" style="background:#9E9E9E" title="אפור" onclick="setTasa(this)"></button>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-submit" onclick="submitForm()">+ הוסף כרטיס</button>
        <button class="btn btn-secondary" id="btn-cancel" style="display:none;margin-top:6px;" onclick="cancelEdit()">ביטול</button>
      </div>

      <hr class="divider"/>

      <!-- URL import from library catalog -->
      <div class="csv-area">
        <div class="section-title">ייבוא מקטלוג הספרייה</div>
        <p class="csv-hint">הדבק קישור מ-lod.library.org.il</p>
        <div class="url-import-row">
          <input id="inp-url" type="url" dir="ltr" placeholder="https://lod.library.org.il/..."/>
          <button id="btn-url-import" class="btn btn-secondary" onclick="importFromLibraryURL()">ייבא</button>
        </div>
      </div>

      <hr class="divider"/>

      <!-- CSV import -->
      <div class="csv-area">
        <div class="section-title">ייבוא CSV</div>
        <p class="csv-hint">עמודות: <code>series,author</code> (שורת כותרת נדרשת)</p>
        <button class="btn btn-secondary" onclick="downloadCSVTemplate()">⬇ הורד תבנית CSV</button>
        <input type="file" id="csv-file" accept=".csv,text/csv"/>
        <div class="form-group" style="margin-bottom:0;">
          <label for="csv-dir">כיוון לכל הייבוא</label>
          <select id="csv-dir">
            <option value="rtl">עברית ← (ימין לשמאל)</option>
            <option value="ltr">English → (Left to Right)</option>
          </select>
        </div>
        <button class="btn btn-secondary" onclick="importCSV()">ייבא קובץ CSV</button>
      </div>

      <hr class="divider"/>

      <!-- Clear all -->
      <button class="btn btn-secondary" style="color:#c0392b" onclick="clearAll()">🗑 נקה הכל</button>

      <hr class="divider"/>

      <!-- Card list -->
      <div>
        <div class="section-title">כרטיסים (<span id="count">0</span>)</div>
        <div class="card-list" id="card-list">
          <div class="empty-hint">עדיין אין כרטיסים.<br/>הוסף למעלה או ייבא CSV.</div>
        </div>
      </div>

    </div>

    <!-- Panel: column sign form -->
    <div id="panel-columns" style="display:none;">
      <div class="section-title">שלט עמודות</div>

      <div class="form-group">
        <label for="col-arrows">כיוון חיצים</label>
        <select id="col-arrows" onchange="updateColumnSign()" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:14px;">
          <option value="both">שני החיצים</option>
          <option value="right">חץ ימינה בלבד ←</option>
          <option value="left">חץ שמאלה בלבד →</option>
        </select>
      </div>

      <hr class="divider"/>

      <div class="section-title" style="font-size:.8rem;opacity:.7;margin-top:0;margin-bottom:6px;">↑ עמודה עליונה</div>
      <div class="form-group">
        <label for="col-range1-top">אות ראשונה (ימין)</label>
        <input id="col-range1-top" type="text" placeholder="א" autocomplete="off" maxlength="1"/>
      </div>
      <div class="form-group">
        <label for="col-range2-top">אות אחרונה (שמאל)</label>
        <input id="col-range2-top" type="text" placeholder="ת" autocomplete="off" maxlength="1"/>
      </div>
      <div class="form-group">
        <label for="col-cat-top">מחלקה</label>
        <input id="col-cat-top" type="text" placeholder="למשל: ספרות" autocomplete="off"/>
      </div>

      <hr class="divider"/>

      <div class="section-title" style="font-size:.8rem;opacity:.7;margin-top:0;margin-bottom:6px;">↓ עמודה תחתונה</div>
      <div class="form-group">
        <label for="col-range1-bot">אות ראשונה (ימין)</label>
        <input id="col-range1-bot" type="text" placeholder="א" autocomplete="off" maxlength="1"/>
      </div>
      <div class="form-group">
        <label for="col-range2-bot">אות אחרונה (שמאל)</label>
        <input id="col-range2-bot" type="text" placeholder="ת" autocomplete="off" maxlength="1"/>
      </div>
      <div class="form-group">
        <label for="col-cat-bot">מחלקה</label>
        <input id="col-cat-bot" type="text" placeholder="למשל: ספרות" autocomplete="off"/>
      </div>
    </div>

  </aside>

  <!-- ===== PREVIEW AREA ===== -->
  <div style="position:relative;overflow:hidden;display:flex;flex-direction:column;">

    <!-- Age cards preview (existing) -->
    <main class="preview-pane" id="preview-pane" style="flex:1;">
      <!-- A4 pages injected here by JS -->
    </main>

    <!-- Column sign preview (new) -->
    <div class="preview-pane" id="preview-columns" style="display:none;flex:1;">
      <div class="col-preview-wrapper">
        <div class="col-sign-scaler">

          <div id="column-sign" style="width:1684px;height:1190px;background:#fff;position:relative;overflow:hidden;print-color-adjust:exact;-webkit-print-color-adjust:exact;">
            <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:url('Pattern.svg') repeat 0 0 / 337px auto;opacity:0.15;pointer-events:none;"></div>

            <!-- Static SVG layer: arrows, divider, border (exact paths from design) -->
            <svg style="position:absolute;left:0;top:0;pointer-events:none;" width="1684" height="1190" viewBox="0 0 1684 1190" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Top right-pointing arrow -->
              <path id="arrow-right" d="M1127.29 434.917L1181.92 489.55L1182.63 490.26L1181.92 490.968L1127.03 545.343L1126.31 546.053L1125.6 545.328L1117.36 536.824L1116.67 536.11L1117.37 535.414L1156.6 496.927H502.01V483.588H1156.63L1117.63 444.838L1116.93 444.141L1117.61 443.431L1125.86 434.927L1126.57 434.199L1127.29 434.917Z" fill="#2956AA" stroke="#2956AA" stroke-width="2"/>
              <!-- Horizontal divider -->
              <path id="col-divider" d="M1659 594.031H25V596.466H1659V594.031Z" fill="#2956AA"/>
              <!-- Bottom left-pointing arrow -->
              <path id="arrow-left" d="M556.936 995.559L502.303 1050.19L501.594 1050.9L502.306 1051.61L557.198 1105.98L557.916 1106.7L558.619 1105.97L566.866 1097.47L567.557 1096.75L566.848 1096.06L527.621 1057.57H1182.21V1044.23H527.597L566.595 1005.48L567.296 1004.78L566.608 1004.07L558.361 995.569L557.655 994.841L556.936 995.559Z" fill="#2956AA" stroke="#2956AA" stroke-width="2"/>
              <!-- Border -->
              <rect x="26.9187" y="26.714" width="1630.16" height="1137.07" stroke="#2956AA" stroke-width="18.31"/>
            </svg>

            <!-- Top dynamic content block (full-width so align-items:center truly centers) -->
            <div id="col-block-top" style="position:absolute;left:0;top:67px;width:1684px;display:flex;flex-direction:column;align-items:center;gap:10px;">
              <span id="col-cat-top-el" style="width:1580px;text-align:center;font-size:96.83px;font-weight:900;line-height:1;color:#2956AA;font-family:var(--font);white-space:nowrap;overflow:hidden;">מחלקה</span>
              <div style="display:flex;width:641.07px;align-items:flex-start;gap:63.63px;direction:ltr;">
                <svg id="col-l2-top" width="187" height="231" viewBox="0 0 187 231" xmlns="http://www.w3.org/2000/svg"></svg>
                <div style="width:139.58px;height:9.03px;background:#2956AA;flex-shrink:0;margin-top:111px;"></div>
                <svg id="col-l1-top" width="187" height="231" viewBox="0 0 187 231" xmlns="http://www.w3.org/2000/svg"></svg>
              </div>
            </div>

            <!-- Bottom dynamic content block -->
            <div id="col-block-bot" style="position:absolute;left:0;top:627px;width:1684px;display:flex;flex-direction:column;align-items:center;gap:10px;">
              <span id="col-cat-bot-el" style="width:1580px;text-align:center;font-size:96.83px;font-weight:900;line-height:1;color:#2956AA;font-family:var(--font);white-space:nowrap;overflow:hidden;">מחלקה</span>
              <div style="display:flex;width:641.07px;align-items:flex-start;gap:63.63px;direction:ltr;">
                <svg id="col-l2-bot" width="187" height="231" viewBox="0 0 187 231" xmlns="http://www.w3.org/2000/svg"></svg>
                <div style="width:139.58px;height:9.03px;background:#2956AA;flex-shrink:0;margin-top:111px;"></div>
                <svg id="col-l1-bot" width="187" height="231" viewBox="0 0 187 231" xmlns="http://www.w3.org/2000/svg"></svg>
              </div>
            </div>

          </div>

        </div>
      </div>
    </div>

  </div>

</div>

<script>
let cards = []; // { series, author, dir }
let editingIdx = -1; // -1 = add mode, ≥0 = edit mode
let activeTab = 'age'; // 'age' | 'columns'

// ===== HELPERS =====
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setTasa(btn) {
  document.querySelectorAll('.tasa-opt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function getSelectedTasa() {
  return document.querySelector('.tasa-opt.active')?.dataset.tasa || '';
}

// ===== ADD / EDIT / REMOVE =====
function submitForm() {
  const series = document.getElementById('inp-series').value.trim();
  const author = document.getElementById('inp-author').value.trim();
  const dir    = document.getElementById('inp-dir').value;
  const tasa   = getSelectedTasa();
  if (!series) { document.getElementById('inp-series').focus(); return; }

  if (editingIdx >= 0) {
    cards[editingIdx] = { series, author, dir, tasa };
    cancelEdit();
  } else {
    cards.push({ series, author, dir, tasa });
    document.getElementById('inp-series').value = '';
    document.getElementById('inp-author').value = '';
    document.getElementById('inp-series').focus();
  }
  render();
}

function addCard(series, author, _category, dir) {
  // kept for CSV import path (_category ignored, tasa defaults to none)
  cards.push({ series, author, dir: dir || 'rtl', tasa: '' });
  render();
}

function editCard(idx) {
  const c = cards[idx];
  editingIdx = idx;
  document.getElementById('inp-series').value = c.series;
  document.getElementById('inp-author').value  = c.author || '';
  document.getElementById('inp-dir').value     = c.dir || 'rtl';
  const tasaColor = c.tasa || '';
  document.querySelectorAll('.tasa-opt').forEach(b =>
    b.classList.toggle('active', b.dataset.tasa === tasaColor)
  );
  document.getElementById('form-title').textContent  = 'ערוך כרטיס';
  document.getElementById('btn-submit').textContent  = '✔ שמור שינויים';
  document.getElementById('btn-cancel').style.display = '';
  document.getElementById('inp-series').focus();
  document.querySelector('.sidebar').scrollTop = 0;
}

function cancelEdit() {
  editingIdx = -1;
  document.getElementById('inp-series').value = '';
  document.getElementById('inp-author').value  = '';
  document.querySelectorAll('.tasa-opt').forEach(b =>
    b.classList.toggle('active', b.dataset.tasa === '')
  );
  document.getElementById('form-title').textContent  = 'הוסף כרטיס';
  document.getElementById('btn-submit').textContent  = '+ הוסף כרטיס';
  document.getElementById('btn-cancel').style.display = 'none';
}

function removeCard(idx) {
  if (editingIdx === idx) cancelEdit();
  const items = document.querySelectorAll('.card-list-item');
  const item = items[idx];
  if (item) {
    item.classList.add('removing');
    setTimeout(() => { cards.splice(idx, 1); render(); }, 180);
  } else {
    cards.splice(idx, 1);
    render();
  }
}

function clearAll() {
  if (cards.length === 0 || confirm('למחוק את כל הכרטיסים?')) {
    cards = [];
    render();
  }
}

// ===== TABS =====
function switchTab(tab) {
  activeTab = tab;
  document.body.dataset.tab = tab;
  document.getElementById('tab-age').classList.toggle('active', tab === 'age');
  document.getElementById('tab-columns').classList.toggle('active', tab === 'columns');
  document.getElementById('panel-age').style.display     = tab === 'age'     ? '' : 'none';
  document.getElementById('panel-columns').style.display = tab === 'columns' ? '' : 'none';
  document.getElementById('preview-pane').style.display     = tab === 'age'     ? '' : 'none';
  document.getElementById('preview-columns').style.display  = tab === 'columns' ? '' : 'none';
  if (tab === 'columns') requestAnimationFrame(updateColumnSignScale);
}

// Render a single Hebrew letter into an SVG element as a pure vector path.
// Uses an off-screen canvas to extract the glyph outline, then fits it
// precisely into the SVG viewBox so every letter's top edge aligns uniformly.
const _glyphCache = {};
function renderLetterSVG(svgEl, letter) {
  const W = 187, H = 231;
  const font = '900 300px Assistant, Arial, sans-serif';
  const color = '#2956AA';

  // Use canvas to measure the actual glyph bounding box
  const canvas = document.createElement('canvas');
  canvas.width = 400; canvas.height = 500;
  const ctx = canvas.getContext('2d');
  ctx.font = font;
  ctx.textBaseline = 'alphabetic';

  // Measure exact pixel bounds by drawing and scanning
  const cacheKey = letter;
  let bounds = _glyphCache[cacheKey];
  if (!bounds) {
    ctx.clearRect(0, 0, 400, 500);
    ctx.fillStyle = '#000';
    ctx.fillText(letter, 50, 350);
    const imgData = ctx.getImageData(0, 0, 400, 500);
    const d = imgData.data;
    let minY = 500, maxY = 0, minX = 400, maxX = 0;
    for (let y = 0; y < 500; y++) {
      for (let x = 0; x < 400; x++) {
        if (d[(y * 400 + x) * 4 + 3] > 20) {
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
        }
      }
    }
    bounds = { minX, minY, maxX, maxY, drawX: 50, drawY: 350 };
    _glyphCache[cacheKey] = bounds;
  }

  const gw = bounds.maxX - bounds.minX + 1;
  const gh = bounds.maxY - bounds.minY + 1;

  // Scale glyph to fit inside the SVG box with some padding
  const pad = 8;
  const availW = W - pad * 2, availH = H - pad * 2;
  const scale = Math.min(availW / gw, availH / gh);
  const sw = gw * scale, sh = gh * scale;
  const ox = (W - sw) / 2, oy = (H - sh) / 2;

  // Draw the glyph onto a larger canvas at the needed scale for path extraction
  const bigCanvas = document.createElement('canvas');
  const bigScale = scale;
  bigCanvas.width = W; bigCanvas.height = H;
  const bctx = bigCanvas.getContext('2d');
  bctx.font = font;
  bctx.textBaseline = 'alphabetic';
  bctx.fillStyle = color;
  // Position: we need drawX/drawY relative to minX/minY mapped to our target
  const tx = ox - (bounds.minX - bounds.drawX) * bigScale;
  const ty = oy - (bounds.minY - bounds.drawY) * bigScale;
  bctx.setTransform(bigScale, 0, 0, bigScale, tx, ty);
  bctx.fillText(letter, 0, 0);

  // Convert canvas to an image inside the SVG
  const dataURL = bigCanvas.toDataURL('image/png');
  svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svgEl.innerHTML = `<image href="${dataURL}" width="${W}" height="${H}" />`;
}

function updateColumnSign() {
  const r1Top  = document.getElementById('col-range1-top').value.trim();
  const r2Top  = document.getElementById('col-range2-top').value.trim();
  const catTop = document.getElementById('col-cat-top').value.trim() || 'מחלקה';
  const r1Bot  = document.getElementById('col-range1-bot').value.trim();
  const r2Bot  = document.getElementById('col-range2-bot').value.trim();
  const catBot = document.getElementById('col-cat-bot').value.trim() || 'מחלקה';
  document.getElementById('col-cat-top-el').textContent = catTop;
  document.getElementById('col-cat-bot-el').textContent = catBot;

  const l1TopChar = r1Top.charAt(0) || 'א';
  const l2TopChar = r2Top.charAt(0) || 'ת';
  const l1BotChar = r1Bot.charAt(0) || 'א';
  const l2BotChar = r2Bot.charAt(0) || 'ת';

  renderLetterSVG(document.getElementById('col-l1-top'), l1TopChar);
  renderLetterSVG(document.getElementById('col-l2-top'), l2TopChar);
  renderLetterSVG(document.getElementById('col-l1-bot'), l1BotChar);
  renderLetterSVG(document.getElementById('col-l2-bot'), l2BotChar);

  // Arrow & section visibility
  const arrows = document.getElementById('col-arrows').value;
  const arrowR   = document.getElementById('arrow-right');
  const arrowL   = document.getElementById('arrow-left');
  const divider  = document.getElementById('col-divider');
  const blockTop = document.getElementById('col-block-top');
  const blockBot = document.getElementById('col-block-bot');

  // Content block height ≈ 338px (category 97 + gap 10 + letters 231)
  // Top section: content 67–405, arrow 435–545  → span 67–545, center 306
  // Bottom section: content 627–965, arrow 996–1106 → span 627–1106, center 866
  // Sign center = 595. When single section, shift so its center = 595.

  if (arrows === 'both') {
    arrowR.style.display = '';   arrowR.style.transform = '';
    arrowL.style.display = '';   arrowL.style.transform = '';
    divider.style.display = '';
    blockTop.style.display = 'flex'; blockTop.style.top = '67px';
    blockBot.style.display = 'flex'; blockBot.style.top = '627px';
  } else if (arrows === 'right') {
    arrowR.style.display = '';
    arrowL.style.display = 'none';
    divider.style.display = 'none';
    blockBot.style.display = 'none';
    blockTop.style.display = 'flex';
    blockTop.style.top = (67 + 289) + 'px';
    arrowR.style.transform = 'translate(0px, 289px)';
  } else if (arrows === 'left') {
    arrowR.style.display = 'none';
    arrowL.style.display = '';
    divider.style.display = 'none';
    blockTop.style.display = 'none';
    blockBot.style.display = 'flex';
    blockBot.style.top = (627 - 271) + 'px';
    arrowL.style.transform = 'translate(0px, -271px)';
  }
}

function updateColumnSignScale() {
  const pane = document.getElementById('preview-columns');
  if (!pane || pane.style.display === 'none') return;
  const scaler = pane.querySelector('.col-sign-scaler');
  if (!scaler) return;
  const availW = pane.clientWidth - 48;
  const scale  = Math.min(1, availW / 1684);
  scaler.style.transform    = `scale(${scale})`;
  scaler.style.marginBottom = `${Math.round(1190 * scale - 1190)}px`;
}

async function saveColumnPDF() {
  const sign = document.getElementById('column-sign');
  const btn  = document.getElementById('btn-pdf');
  btn.textContent = '⏳ מכין...';
  btn.disabled    = true;
  try {
    const scaler = document.querySelector('.col-sign-scaler');
    const prev   = scaler.style.transform;
    scaler.style.transform = 'none';
    await document.fonts.ready;
    await new Promise(r => requestAnimationFrame(r));
    const canvas = await html2canvas(sign, {
      scale: 2, useCORS: true, allowTaint: true,
      backgroundColor: '#ffffff', logging: false,
      width: 1684, height: 1190,
    });
    scaler.style.transform = prev;
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const W = 297, H = 210;
    const imgData = canvas.toDataURL('image/png');
    const imgH    = (canvas.height / canvas.width) * W;
    pdf.addImage(imgData, 'PNG', 0, Math.max(0, (H - imgH) / 2), W, Math.min(imgH, H));
    pdf.save('שלט-עמודות.pdf');
  } catch (e) {
    alert('שגיאה: ' + e.message);
  } finally {
    btn.textContent = '📄 שמור PDF';
    btn.disabled    = false;
  }
}

function handlePDF() {
  if (activeTab === 'age') savePDF();
  else saveColumnPDF();
}

function handlePrint() {
  if (activeTab === 'columns') {
    const s = document.createElement('style');
    s.textContent = '@page { size: A4 landscape; margin: 5mm; }';
    document.head.appendChild(s);
    window.print();
    s.remove();
  } else {
    window.print();
  }
}

// ===== LIBRARY URL IMPORT =====
async function importFromLibraryURL() {
  const input = document.getElementById('inp-url');
  const btn   = document.getElementById('btn-url-import');
  const url   = input.value.trim();
  if (!url) return;

  if (!url.includes('lod.library.org.il')) {
    alert('כרגע נתמך רק קישור מ-lod.library.org.il');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'טוען…';

  try {
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error('שגיאת רשת (' + response.status + ')');
    const data = await response.json();
    const doc  = new DOMParser().parseFromString(data.contents, 'text/html');

    let series = '', author = '';

    for (const strong of doc.querySelectorAll('strong')) {
      const label = strong.textContent.trim();
      const next  = strong.nextElementSibling;
      if (label === 'סדרה' && next && next.tagName === 'A') {
        series = next.textContent.trim();
      }
      if ((label === 'מחבר' || label === 'מחבר/ת') && next && next.tagName === 'A') {
        author = next.textContent.trim();
      }
    }

    // fallback: search within parent element
    if (!series) {
      const el = [...doc.querySelectorAll('strong')].find(s => s.textContent.trim() === 'סדרה');
      if (el) {
        const a = el.closest('td,li,div,p') && el.closest('td,li,div,p').querySelector('a');
        if (a) series = a.textContent.trim();
      }
    }

    if (!series) {
      alert('לא נמצאה סדרה בדף. ייתכן שמדובר בספר שאינו חלק מסדרה.');
      return;
    }

    const dir = /[\u0590-\u05FF]/.test(series) ? 'rtl' : 'ltr';
    cards.push({ series, author, dir, tasa: '' });
    render();
    input.value = '';

  } catch (e) {
    alert('שגיאה בטעינת הדף: ' + (e.message || e));
  } finally {
    btn.disabled    = false;
    btn.textContent = 'ייבא';
  }
}

// ===== CSV IMPORT =====
function importCSV() {
  const file = document.getElementById('csv-file').files[0];
  if (!file) { alert('בחרי/בחר קובץ CSV תחילה.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const dir = document.getElementById('csv-dir').value;
    parseCSV(e.target.result, dir);
  };
  reader.readAsText(file, 'utf-8');
}

function parseCSV(text, dir = 'rtl') {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return;

  // Detect header
  const headerLine = lines[0].toLowerCase();
  const hasSeries = headerLine.includes('series') || headerLine.includes('סדרה');
  const startIdx  = hasSeries ? 1 : 0;

  let added = 0;
  for (let i = startIdx; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (cols.length < 1) continue;
    const series   = (cols[0] || '').trim();
    const author   = (cols[1] || '').trim();
    if (series) { cards.push({ series, author, dir }); added++; }
  }
  render();
  if (added) alert(`יובאו ${added} כרטיסים.`);
}

function splitCSVLine(line) {
  // Simple CSV split supporting double-quoted fields
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

// ===== PAGINATION =====
// Measures actual rendered card positions to split into A4 pages
async function paginateCards() {
  const PAGE_H_MM = 277; // A4 297mm - 10mm top padding - 10mm bottom padding
  const MM_PX = 96 / 25.4;
  const pageHpx = PAGE_H_MM * MM_PX;

  const temp = document.createElement('div');
  Object.assign(temp.style, {
    position: 'fixed', visibility: 'hidden', top: '0', left: '0',
    width: '190mm', display: 'flex', flexWrap: 'wrap',
    columnGap: '4mm', rowGap: '6mm', alignContent: 'start',
  });
  temp.innerHTML = cards.map(buildCardHTML).join('');
  document.body.appendChild(temp);
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  const els = [...temp.querySelectorAll('.sign-card')];
  const pages = [[]];
  els.forEach((el, i) => {
    const pageIdx = pages.length - 1;
    const relBottom = el.offsetTop + el.offsetHeight - pageIdx * pageHpx;
    if (relBottom > pageHpx && pages[pageIdx].length > 0) {
      pages.push([cards[i]]);
    } else {
      pages[pageIdx].push(cards[i]);
    }
  });

  document.body.removeChild(temp);
  return pages;
}

// ===== RENDER =====
function buildCardHTML(card) {
  const dir  = card.dir  || 'rtl';
  const tasa = card.tasa || '';
  const textSpans = card.author
    ? `<span class="series-name">${escHtml(card.series)}</span><span class="separator"> | </span><span class="author-name">${escHtml(card.author)}</span>`
    : `<span class="series-name">${escHtml(card.series)}</span>`;
  const textZoneInner = tasa
    ? `<div class="tasa-strip" style="background:${tasa}"></div><div class="text-content">${textSpans}</div>`
    : textSpans;
  return `<div class="sign-card" style="direction:${dir};">
  <div class="fold"></div>
  <div class="text-zone${tasa ? ' tasa' : ''}">${textZoneInner}</div>
  <div class="fold"></div>
</div>`;
}


function render() {
  // Update count
  document.getElementById('count').textContent = cards.length;

  // Update sidebar card list
  const list = document.getElementById('card-list');
  if (!cards.length) {
    list.innerHTML = '<div class="empty-hint">עדיין אין כרטיסים.<br/>הוסף למעלה או ייבא CSV.</div>';
  } else {
    list.innerHTML = cards.map((c, i) => {
      return `<div class="card-list-item">
        <span class="card-list-dot" style="background:#2956AA"></span>
        <span class="card-list-text">
          <span class="card-list-series">${escHtml(c.series)}</span>
          ${c.author ? `<span class="card-list-author"> — ${escHtml(c.author)}</span>` : ''}
          ${c.dir === 'ltr' ? '<span class="card-list-author"> · EN</span>' : ''}
        </span>
        <button class="btn-edit" title="ערוך" onclick="editCard(${i})">✎</button>
        <button class="btn-del" title="מחק" onclick="removeCard(${i})">✕</button>
      </div>`;
    }).join('');
  }

  // Update preview pages
  const pane = document.getElementById('preview-pane');
  if (!cards.length) {
    pane.innerHTML = `<div style="color:#ddd;font-size:1.2rem;margin-top:80px;text-align:center;">הוסף כרטיסים כדי לראות תצוגה מקדימה</div>`;
    return;
  }

  paginateCards().then(pages => {
    pane.innerHTML = pages.map(pageCards =>
      `<div class="a4-page">${pageCards.map(buildCardHTML).join('\n')}</div>`
    ).join('\n');
  });
}

// ===== CSV TEMPLATE =====
function downloadCSVTemplate() {
  const rows = [
    'series,author',
    'הארי פוטר,ג\'יי.קיי. רולינג',
    'ארנב שרוצה לישון,קרל-יוהן פורסן ארלין',
    'שם הסדרה,שם המחבר/ת',
    ',',
  ];
  const blob = new Blob(['\uFEFF' + rows.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'תבנית-כרטיסי-ספרייה.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== PDF EXPORT =====
async function savePDF() {
  const pages = document.querySelectorAll('.a4-page');
  if (!pages.length) { alert('אין כרטיסים להורדה'); return; }

  const btn = document.getElementById('btn-pdf');
  btn.textContent = '⏳ מכין...';
  btn.disabled = true;

  try {
    await document.fonts.ready;
    await new Promise(r => requestAnimationFrame(r));
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const A4_W = 210, A4_H = 297;

    for (let i = 0; i < pages.length; i++) {
      const canvas = await html2canvas(pages[i], {
        scale: 3,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        logging: false,
        onclone: (_doc, el) => {
          el.querySelectorAll('.sign-card').forEach(card => {
            card.style.animation = 'none';
            card.style.opacity   = '1';
            card.style.transform = 'none';
          });
        },
      });
      if (i > 0) pdf.addPage();
      const imgData = canvas.toDataURL('image/png');
      const imgH = (canvas.height / canvas.width) * A4_W;
      pdf.addImage(imgData, 'PNG', 0, 0, A4_W, Math.min(imgH, A4_H));
    }

    pdf.save('כרטיסי-ספרייה.pdf');
  } catch (e) {
    alert('שגיאה ביצירת PDF: ' + e.message);
  } finally {
    btn.textContent = '📄 שמור PDF';
    btn.disabled = false;
  }
}

// ===== KEYBOARD SHORTCUT =====
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') addCard();
});

// ===== INIT =====
document.body.dataset.tab = 'age';
render();
updateColumnSign();

['col-range1-top','col-range2-top','col-cat-top','col-range1-bot','col-range2-bot','col-cat-bot']
  .forEach(id => document.getElementById(id).addEventListener('input', updateColumnSign));

const _colPane = document.getElementById('preview-columns');
if (_colPane && window.ResizeObserver) {
  new ResizeObserver(updateColumnSignScale).observe(_colPane);
}
</script>
