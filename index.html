<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>יצירת כרטיסי גיל — ספרייה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Assistant', Arial, sans-serif;
  --radius: 8px;
  --ui-bg: #f4f5f7;
  --panel-bg: #ffffff;
  --border: #dde0e6;
  --accent: #2956AA;
  --accent-text: #fff;
  --danger: #d63031;
  --text: #1e2029;
  --muted: #6b7280;
}

html, body {
  font-family: var(--font);
  background: var(--ui-bg);
  color: var(--text);
  height: 100%;
  font-size: 15px;
}

/* ===== SCREEN LAYOUT ===== */
@media screen {
  .app-header {
    background: var(--accent);
    color: #fff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
  }

  .app-header h1 {
    font-size: 1.15rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .btn-print {
    background: #fff;
    color: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 8px 20px;
    font-family: var(--font);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-print:hover { background: #e8edf8; }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 52px);
  }

  /* ----- Sidebar ----- */
  .sidebar {
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-title {
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .form-group label { font-size: .85rem; font-weight: 600; }
  .form-group input,
  .form-group select {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font);
    font-size: .95rem;
    direction: rtl;
    width: 100%;
  }
  .form-group input:focus,
  .form-group select:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: var(--font);
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; }
  .btn-secondary { background: #e8edf8; color: var(--accent); width: 100%; }

  .divider { border: none; border-top: 1px solid var(--border); }

  /* CSV upload */
  .csv-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .csv-hint { font-size: .78rem; color: var(--muted); }
  #csv-file { font-size: .85rem; }

  /* Card list */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 320px;
    overflow-y: auto;
  }

  .card-list-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: .85rem;
  }

  .card-list-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .card-list-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-list-series { font-weight: 700; }
  .card-list-author { color: var(--muted); }

  .btn-edit, .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .btn-edit:hover { color: var(--accent); background: #e8edf8; }
  .btn-del:hover  { color: var(--danger);  background: #ffeaea; }

  .empty-hint {
    text-align: center;
    color: var(--muted);
    font-size: .85rem;
    padding: 16px;
  }

  /* ----- Preview pane ----- */
  .preview-pane {
    overflow-y: auto;
    background: #888;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .a4-page {
    width: 210mm;
    min-height: 297mm;
    background: #fff;
    padding: 10mm;
    box-shadow: 0 4px 24px rgba(0,0,0,.3);
  }
}

/* ===== A4 PAGE LAYOUT (screen + print) ===== */
.a4-page {
  display: flex;
  flex-wrap: wrap;
  align-content: start;
  column-gap: 4mm;
  row-gap: 6mm;
}

/* ===== SHARED CARD STYLES (screen + print) ===== */
.sign-card {
  display: inline-flex;
  flex-direction: column;
  min-width: 60mm;
  max-width: 250mm;
  height: 35mm;
  flex-shrink: 0;
  direction: rtl;
  print-color-adjust: exact;
  -webkit-print-color-adjust: exact;
}

.sign-card .fold {
  height: 7.5mm;
  flex-shrink: 0;
}

.sign-card .text-zone {
  height: 20mm;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5mm;
  white-space: nowrap;
  overflow: hidden;
  border-top: 0.4pt dashed var(--sc, rgba(0,0,0,0.25));
  border-bottom: 0.4pt dashed var(--sc, rgba(0,0,0,0.25));
  font-size: 18pt;
  line-height: 1;
}

.sign-card .series-name { font-weight: 600; }
.sign-card .separator   { font-weight: 400; opacity: .6; margin: 0 .15em; }
.sign-card .author-name { font-weight: 400; }


/* ===== PRINT STYLES ===== */
@media print {
  @page { size: A4 portrait; margin: 10mm; }

  .app-header,
  .sidebar,
  .preview-pane > *:not(.a4-page) { display: none !important; }

  html, body { background: white; height: auto; }

  .layout { display: block; height: auto; }

  .preview-pane {
    background: white;
    padding: 0;
    overflow: visible;
  }

  .a4-page {
    width: 100%;
    min-height: auto;
    box-shadow: none;
    padding: 0;
  }

  .sign-card {
    break-inside: avoid;
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="app-header">
  <h1>📚 יצירת כרטיסי גיל — ספרייה</h1>
  <div style="display:flex;gap:8px;">
    <button class="btn-print" onclick="window.print()">🖨 הדפס</button>
    <button class="btn-print btn-pdf" id="btn-pdf" onclick="savePDF()">📄 שמור PDF</button>
  </div>
</header>

<!-- ===== LAYOUT ===== -->
<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">

    <!-- Add card form -->
    <div>
      <div class="section-title" id="form-title">הוסף כרטיס</div>
      <div class="form-group">
        <label for="inp-series">שם הסדרה / הספר</label>
        <input id="inp-series" type="text" placeholder="למשל: הארי פוטר" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label for="inp-author">שם המחבר/ת</label>
        <input id="inp-author" type="text" placeholder="למשל: ג'יי.קיי. רולינג" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label for="inp-cat">קטגוריית גיל</label>
        <select id="inp-cat">
          <option value="גיל רך">גיל רך (0–6)</option>
          <option value="ילדים">ילדים (7–12)</option>
          <option value="נוער">נוער (13–18)</option>
          <option value="מבוגרות/ים">מבוגרות/ים (18+)</option>
          <option value="מיוחדים">מיוחדים</option>
          <option value="אחר">אחר</option>
        </select>
      </div>
      <div class="form-group">
        <label for="inp-dir">כיוון טקסט</label>
        <select id="inp-dir">
          <option value="rtl">עברית ← (ימין לשמאל)</option>
          <option value="ltr">English → (Left to Right)</option>
        </select>
      </div>
      <button class="btn btn-primary" id="btn-submit" onclick="submitForm()">+ הוסף כרטיס</button>
      <button class="btn btn-secondary" id="btn-cancel" style="display:none;margin-top:6px;" onclick="cancelEdit()">ביטול</button>
    </div>

    <hr class="divider"/>

    <!-- CSV import -->
    <div class="csv-area">
      <div class="section-title">ייבוא CSV</div>
      <p class="csv-hint">עמודות: <code>series,author,category</code> (שורת כותרת נדרשת)</p>
      <button class="btn btn-secondary" onclick="downloadCSVTemplate()">⬇ הורד תבנית CSV</button>
      <input type="file" id="csv-file" accept=".csv,text/csv"/>
      <div class="form-group" style="margin-bottom:0;">
        <label for="csv-dir">כיוון לכל הייבוא</label>
        <select id="csv-dir">
          <option value="rtl">עברית ← (ימין לשמאל)</option>
          <option value="ltr">English → (Left to Right)</option>
        </select>
      </div>
      <button class="btn btn-secondary" onclick="importCSV()">ייבא קובץ CSV</button>
    </div>

    <hr class="divider"/>

    <!-- Clear all -->
    <button class="btn btn-secondary" style="color:#c0392b" onclick="clearAll()">🗑 נקה הכל</button>

    <hr class="divider"/>

    <!-- Card list -->
    <div>
      <div class="section-title">כרטיסים (<span id="count">0</span>)</div>
      <div class="card-list" id="card-list">
        <div class="empty-hint">עדיין אין כרטיסים.<br/>הוסף למעלה או ייבא CSV.</div>
      </div>
    </div>

  </aside>

  <!-- ===== PREVIEW PANE ===== -->
  <main class="preview-pane" id="preview-pane">
    <!-- A4 pages injected here by JS -->
  </main>

</div>

<script>
// ===== COLOR MAP =====
const COLORS = {
  'אחר':         { bg: '#2956AA', text: '#FFFFFF' },
  'מיוחדים':     { bg: '#2956AA', text: '#FFFFFF' },
  'גיל רך':      { bg: '#FFC980', text: '#603700' },
  'ילדים':       { bg: '#FFE9BD', text: '#6E4A00' },
  'נוער':        { bg: '#77DFD5', text: '#13534D' },
  'מבוגרות/ים':  { bg: '#F7F7F9', text: '#262A33' },
};

const CATEGORY_LABELS = {
  'אחר':        'אחר',
  'מיוחדים':    'מיוחדים',
  'גיל רך':     'גיל רך (0–6)',
  'ילדים':      'ילדים (7–12)',
  'נוער':       'נוער (13–18)',
  'מבוגרות/ים': 'מבוגרות/ים (18+)',
};

let cards = []; // { series, author, category }
let editingIdx = -1; // -1 = add mode, ≥0 = edit mode

// ===== HELPERS =====
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function resolveCategory(raw) {
  const key = (raw || '').trim();
  // Try exact match, then lowercase, then fallback
  if (COLORS[key]) return key;
  const lower = key.toLowerCase();
  const aliases = {
    'other': 'אחר', 'special': 'מיוחדים',
    '0-6': 'גיל רך', 'גיל-רך': 'גיל רך', 'baby': 'גיל רך',
    '7-12': 'ילדים', 'children': 'ילדים', 'kids': 'ילדים',
    '13-18': 'נוער', 'teen': 'נוער', 'teens': 'נוער', 'youth': 'נוער',
    '18+': 'מבוגרות/ים', 'adults': 'מבוגרות/ים', 'adult': 'מבוגרות/ים',
    'מבוגרים': 'מבוגרות/ים',
  };
  return aliases[lower] || 'אחר';
}

// ===== ADD / EDIT / REMOVE =====
function submitForm() {
  const series   = document.getElementById('inp-series').value.trim();
  const author   = document.getElementById('inp-author').value.trim();
  const category = resolveCategory(document.getElementById('inp-cat').value);
  const dir      = document.getElementById('inp-dir').value;
  if (!series) { document.getElementById('inp-series').focus(); return; }

  if (editingIdx >= 0) {
    cards[editingIdx] = { series, author, category, dir };
    cancelEdit();
  } else {
    cards.push({ series, author, category, dir });
    document.getElementById('inp-series').value = '';
    document.getElementById('inp-author').value = '';
    document.getElementById('inp-series').focus();
  }
  render();
}

function addCard(series, author, category, dir) {
  // kept for CSV import path
  category = resolveCategory(category || 'אחר');
  cards.push({ series, author, category, dir: dir || 'rtl' });
  render();
}

function editCard(idx) {
  const c = cards[idx];
  editingIdx = idx;
  document.getElementById('inp-series').value = c.series;
  document.getElementById('inp-author').value  = c.author || '';
  document.getElementById('inp-cat').value     = c.category;
  document.getElementById('inp-dir').value     = c.dir || 'rtl';
  document.getElementById('form-title').textContent  = 'ערוך כרטיס';
  document.getElementById('btn-submit').textContent  = '✔ שמור שינויים';
  document.getElementById('btn-cancel').style.display = '';
  document.getElementById('inp-series').focus();
  document.querySelector('.sidebar').scrollTop = 0;
}

function cancelEdit() {
  editingIdx = -1;
  document.getElementById('inp-series').value = '';
  document.getElementById('inp-author').value  = '';
  document.getElementById('form-title').textContent  = 'הוסף כרטיס';
  document.getElementById('btn-submit').textContent  = '+ הוסף כרטיס';
  document.getElementById('btn-cancel').style.display = 'none';
}

function removeCard(idx) {
  if (editingIdx === idx) cancelEdit();
  cards.splice(idx, 1);
  render();
}

function clearAll() {
  if (cards.length === 0 || confirm('למחוק את כל הכרטיסים?')) {
    cards = [];
    render();
  }
}

// ===== CSV IMPORT =====
function importCSV() {
  const file = document.getElementById('csv-file').files[0];
  if (!file) { alert('בחרי/בחר קובץ CSV תחילה.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const dir = document.getElementById('csv-dir').value;
    parseCSV(e.target.result, dir);
  };
  reader.readAsText(file, 'utf-8');
}

function parseCSV(text, dir = 'rtl') {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return;

  // Detect header
  const headerLine = lines[0].toLowerCase();
  const hasSeries = headerLine.includes('series') || headerLine.includes('סדרה');
  const startIdx  = hasSeries ? 1 : 0;

  let added = 0;
  for (let i = startIdx; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (cols.length < 1) continue;
    const series   = (cols[0] || '').trim();
    const author   = (cols[1] || '').trim();
    const category = resolveCategory(cols[2] || 'אחר');
    if (series) { cards.push({ series, author, category, dir }); added++; }
  }
  render();
  if (added) alert(`יובאו ${added} כרטיסים.`);
}

function splitCSVLine(line) {
  // Simple CSV split supporting double-quoted fields
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

// ===== RENDER =====
function scoreColor(hex) {
  // text color at ~30% opacity for score lines
  return hex + '4D';
}

function buildCardHTML(card) {
  const colors = COLORS[card.category] || COLORS['אחר'];
  const sc  = scoreColor(colors.text);
  const dir = card.dir || 'rtl';
  return `<div class="sign-card" style="background:${colors.bg};color:${colors.text};--sc:${sc};direction:${dir};">
  <div class="fold"></div>
  <div class="text-zone">
    <span class="series-name">${escHtml(card.series)}</span><span class="separator"> | </span><span class="author-name">${escHtml(card.author || '')}</span>
  </div>
  <div class="fold"></div>
</div>`;
}


function render() {
  // Update count
  document.getElementById('count').textContent = cards.length;

  // Update sidebar card list
  const list = document.getElementById('card-list');
  if (!cards.length) {
    list.innerHTML = '<div class="empty-hint">עדיין אין כרטיסים.<br/>הוסף למעלה או ייבא CSV.</div>';
  } else {
    list.innerHTML = cards.map((c, i) => {
      const col = (COLORS[c.category] || COLORS['אחר']).bg;
      return `<div class="card-list-item">
        <span class="card-list-dot" style="background:${col}"></span>
        <span class="card-list-text">
          <span class="card-list-series">${escHtml(c.series)}</span>
          ${c.author ? `<span class="card-list-author"> — ${escHtml(c.author)}</span>` : ''}
          ${c.dir === 'ltr' ? '<span class="card-list-author"> · EN</span>' : ''}
        </span>
        <button class="btn-edit" title="ערוך" onclick="editCard(${i})">✎</button>
        <button class="btn-del" title="מחק" onclick="removeCard(${i})">✕</button>
      </div>`;
    }).join('');
  }

  // Update preview pages
  const pane = document.getElementById('preview-pane');
  if (!cards.length) {
    pane.innerHTML = `<div style="color:#ddd;font-size:1.2rem;margin-top:80px;text-align:center;">הוסף כרטיסים כדי לראות תצוגה מקדימה</div>`;
    return;
  }

  pane.innerHTML = `<div class="a4-page">${cards.map(buildCardHTML).join('\n')}</div>`;
}

// ===== CSV TEMPLATE =====
function downloadCSVTemplate() {
  const rows = [
    'series,author,category',
    'הארי פוטר,ג\'יי.קיי. רולינג,נוער',
    'ארנב שרוצה לישון,קרל-יוהן פורסן ארלין,גיל רך',
    'שם הסדרה,שם המחבר/ת,ילדים',
    ',,מבוגרות/ים',
  ];
  const blob = new Blob(['\uFEFF' + rows.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'תבנית-כרטיסי-ספרייה.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== PDF EXPORT =====
async function savePDF() {
  const pages = document.querySelectorAll('.a4-page');
  if (!pages.length) { alert('אין כרטיסים להורדה'); return; }

  const btn = document.getElementById('btn-pdf');
  btn.textContent = '⏳ מכין...';
  btn.disabled = true;

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const A4_W = 210, A4_H = 297;

    for (let i = 0; i < pages.length; i++) {
      const canvas = await html2canvas(pages[i], {
        scale: 3,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        logging: false,
      });
      if (i > 0) pdf.addPage();
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const imgH = (canvas.height / canvas.width) * A4_W;
      pdf.addImage(imgData, 'JPEG', 0, 0, A4_W, Math.min(imgH, A4_H));
    }

    pdf.save('כרטיסי-ספרייה.pdf');
  } catch (e) {
    alert('שגיאה ביצירת PDF: ' + e.message);
  } finally {
    btn.textContent = '📄 שמור PDF';
    btn.disabled = false;
  }
}

// ===== KEYBOARD SHORTCUT =====
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') addCard();
});

// ===== INIT =====
render();
</script>
</body>
</html>
