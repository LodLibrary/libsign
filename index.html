<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>יצירת כרטיסי גיל — ספרייה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Assistant', Arial, sans-serif;
  --radius: 8px;
  --ui-bg: #f4f5f7;
  --panel-bg: #ffffff;
  --border: #dde0e6;
  --accent: #2956AA;
  --accent-text: #fff;
  --danger: #d63031;
  --text: #1e2029;
  --muted: #6b7280;
}

html, body {
  font-family: var(--font);
  background: var(--ui-bg);
  color: var(--text);
  height: 100%;
  font-size: 15px;
}

/* ===== SCREEN LAYOUT ===== */
@media screen {
  .app-header {
    background: var(--accent);
    color: #fff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
  }

  .app-header h1 {
    font-size: 1.15rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .btn-print {
    background: #fff;
    color: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 8px 20px;
    font-family: var(--font);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, transform .12s;
  }
  .btn-print:hover  { background: #e8edf8; transform: translateY(-1px); }
  .btn-print:active { transform: scale(0.95); }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 52px);
  }

  /* ----- Sidebar ----- */
  .sidebar {
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-title {
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .form-group label { font-size: .85rem; font-weight: 600; }
  .form-group input,
  .form-group select {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font);
    font-size: .95rem;
    direction: rtl;
    width: 100%;
  }
  .form-group input:focus,
  .form-group select:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: var(--font);
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .15s, transform .12s;
  }
  .btn:hover  { opacity: .88; }
  .btn:active { transform: scale(0.95); }
  .btn-primary   { background: var(--accent); color: #fff; width: 100%; }
  .btn-secondary { background: #e8edf8; color: var(--accent); width: 100%; }

  .divider { border: none; border-top: 1px solid var(--border); }

  /* CSV upload */
  .csv-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .csv-hint { font-size: .78rem; color: var(--muted); }
  #csv-file { font-size: .85rem; }

  /* Card list */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 320px;
    overflow-y: auto;
  }

  .card-list-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: .85rem;
    animation: slideInItem .2s ease both;
    transition: background .15s, transform .15s, opacity .18s;
  }
  .card-list-item:hover { background: var(--ui-bg); }
  .card-list-item.removing { opacity: 0; transform: translateX(12px); }

  .card-list-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .card-list-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-list-series { font-weight: 700; }
  .card-list-author { color: var(--muted); }

  .btn-edit, .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    flex-shrink: 0;
    transition: color .12s, background .12s, transform .1s;
  }
  .btn-edit:hover  { color: var(--accent); background: #e8edf8; }
  .btn-del:hover   { color: var(--danger);  background: #ffeaea; }
  .btn-edit:active, .btn-del:active { transform: scale(0.82); }

  .empty-hint {
    text-align: center;
    color: var(--muted);
    font-size: .85rem;
    padding: 16px;
  }

  /* ----- Animations ----- */
  @keyframes slideInItem {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeScaleIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }
  .sign-card { animation: fadeScaleIn .25s ease both; }

  /* ----- Preview pane ----- */
  .preview-pane {
    overflow-y: auto;
    background: #888;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .a4-page {
    width: 210mm;
    min-height: 297mm;
    background: #fff;
    padding: 10mm;
    box-shadow: 0 4px 24px rgba(0,0,0,.3);
  }

  /* ----- Tab bar ----- */
  .tab-bar { display: flex; gap: 4px; }
  .tab-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    border-radius: 6px 6px 0 0;
    padding: 6px 16px;
    font-family: var(--font);
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .tab-btn.active { background: rgba(255,255,255,0.30); }
  .tab-btn:hover  { background: rgba(255,255,255,0.22); }

  /* ----- Column sign preview ----- */
  .col-preview-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
    overflow: auto;
    height: 100%;
  }
  .col-sign-scaler { transform-origin: top left; flex-shrink: 0; }
}

/* ===== A4 PAGE LAYOUT (screen + print) ===== */
.a4-page {
  display: flex;
  flex-wrap: wrap;
  align-content: start;
  column-gap: 4mm;
  row-gap: 6mm;
}

/* ===== SHARED CARD STYLES (screen + print) ===== */
.sign-card {
  display: inline-flex;
  flex-direction: column;
  min-width: 60mm;
  max-width: 250mm;
  height: 35mm;
  flex-shrink: 0;
  direction: rtl;
  print-color-adjust: exact;
  -webkit-print-color-adjust: exact;
}

.sign-card .fold {
  height: 7.5mm;
  flex-shrink: 0;
}

.sign-card .text-zone {
  height: 20mm;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5mm;
  white-space: nowrap;
  overflow: hidden;
  border-top: 0.4pt dashed var(--sc, rgba(0,0,0,0.25));
  border-bottom: 0.4pt dashed var(--sc, rgba(0,0,0,0.25));
  font-size: 18pt;
  line-height: 1;
}

.sign-card .series-name { font-weight: 600; }
.sign-card .separator   { font-weight: 400; opacity: .6; margin: 0 .15em; }
.sign-card .author-name { font-weight: 400; }


/* ===== PRINT STYLES ===== */
@media print {
  @page { size: A4 portrait; margin: 10mm; }

  .app-header,
  .sidebar,
  .preview-pane > *:not(.a4-page) { display: none !important; }

  html, body { background: white; height: auto; }

  .layout { display: block; height: auto; }

  .preview-pane {
    background: white;
    padding: 0;
    overflow: visible;
  }

  .a4-page {
    width: 100%;
    min-height: auto;
    box-shadow: none;
    padding: 0;
    page-break-after: always;
  }

  .a4-page:last-child { page-break-after: avoid; }

  .sign-card {
    break-inside: avoid;
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }

  /* ----- Tab-aware print visibility ----- */
  body[data-tab="age"]     #preview-columns { display: none !important; }
  body[data-tab="columns"] #preview-pane    { display: none !important; }
  body[data-tab="columns"] .col-preview-wrapper { padding: 0 !important; }
  body[data-tab="columns"] .col-sign-scaler {
    transform: scale(0.642) !important;
    transform-origin: top left !important;
    margin-bottom: -426px !important;
  }
}
</style>

<script>
// ===== COLOR MAP =====
const COLORS = {
  'אחר':         { bg: '#2956AA', text: '#FFFFFF' },
  'מיוחדים':     { bg: '#2956AA', text: '#FFFFFF' },
  'גיל רך':      { bg: '#FFC980', text: '#603700' },
  'ילדים':       { bg: '#FFE9BD', text: '#6E4A00' },
  'נוער':        { bg: '#77DFD5', text: '#13534D' },
  'מבוגרות/ים':  { bg: '#F7F7F9', text: '#262A33' },
};

const CATEGORY_LABELS = {
  'אחר':        'אחר',
  'מיוחדים':    'מיוחדים',
  'גיל רך':     'גיל רך (0–6)',
  'ילדים':      'ילדים (7–12)',
  'נוער':       'נוער (13–18)',
  'מבוגרות/ים': 'מבוגרות/ים (18+)',
};

let cards = []; // { series, author, category }
let editingIdx = -1; // -1 = add mode, ≥0 = edit mode
let activeTab = 'age'; // 'age' | 'columns'

// ===== HELPERS =====
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function resolveCategory(raw) {
  const key = (raw || '').trim();
  // Try exact match, then lowercase, then fallback
  if (COLORS[key]) return key;
  const lower = key.toLowerCase();
  const aliases = {
    'other': 'אחר', 'special': 'מיוחדים',
    '0-6': 'גיל רך', 'גיל-רך': 'גיל רך', 'baby': 'גיל רך',
    '7-12': 'ילדים', 'children': 'ילדים', 'kids': 'ילדים',
    '13-18': 'נוער', 'teen': 'נוער', 'teens': 'נוער', 'youth': 'נוער',
    '18+': 'מבוגרות/ים', 'adults': 'מבוגרות/ים', 'adult': 'מבוגרות/ים',
    'מבוגרים': 'מבוגרות/ים',
  };
  return aliases[lower] || 'אחר';
}

// ===== ADD / EDIT / REMOVE =====
function submitForm() {
  const series   = document.getElementById('inp-series').value.trim();
  const author   = document.getElementById('inp-author').value.trim();
  const category = resolveCategory(document.getElementById('inp-cat').value);
  const dir      = document.getElementById('inp-dir').value;
  if (!series) { document.getElementById('inp-series').focus(); return; }

  if (editingIdx >= 0) {
    cards[editingIdx] = { series, author, category, dir };
    cancelEdit();
  } else {
    cards.push({ series, author, category, dir });
    document.getElementById('inp-series').value = '';
    document.getElementById('inp-author').value = '';
    document.getElementById('inp-series').focus();
  }
  render();
}

function addCard(series, author, category, dir) {
  // kept for CSV import path
  category = resolveCategory(category || 'אחר');
  cards.push({ series, author, category, dir: dir || 'rtl' });
  render();
}

function editCard(idx) {
  const c = cards[idx];
  editingIdx = idx;
  document.getElementById('inp-series').value = c.series;
  document.getElementById('inp-author').value  = c.author || '';
  document.getElementById('inp-cat').value     = c.category;
  document.getElementById('inp-dir').value     = c.dir || 'rtl';
  document.getElementById('form-title').textContent  = 'ערוך כרטיס';
  document.getElementById('btn-submit').textContent  = '✔ שמור שינויים';
  document.getElementById('btn-cancel').style.display = '';
  document.getElementById('inp-series').focus();
  document.querySelector('.sidebar').scrollTop = 0;
}

function cancelEdit() {
  editingIdx = -1;
  document.getElementById('inp-series').value = '';
  document.getElementById('inp-author').value  = '';
  document.getElementById('form-title').textContent  = 'הוסף כרטיס';
  document.getElementById('btn-submit').textContent  = '+ הוסף כרטיס';
  document.getElementById('btn-cancel').style.display = 'none';
}

function removeCard(idx) {
  if (editingIdx === idx) cancelEdit();
  const items = document.querySelectorAll('.card-list-item');
  const item = items[idx];
  if (item) {
    item.classList.add('removing');
    setTimeout(() => { cards.splice(idx, 1); render(); }, 180);
  } else {
    cards.splice(idx, 1);
    render();
  }
}

function clearAll() {
  if (cards.length === 0 || confirm('למחוק את כל הכרטיסים?')) {
    cards = [];
    render();
  }
}

// ===== TABS =====
function switchTab(tab) {
  activeTab = tab;
  document.body.dataset.tab = tab;
  document.getElementById('tab-age').classList.toggle('active', tab === 'age');
  document.getElementById('tab-columns').classList.toggle('active', tab === 'columns');
  document.getElementById('panel-age').style.display     = tab === 'age'     ? '' : 'none';
  document.getElementById('panel-columns').style.display = tab === 'columns' ? '' : 'none';
  document.getElementById('preview-pane').style.display     = tab === 'age'     ? '' : 'none';
  document.getElementById('preview-columns').style.display  = tab === 'columns' ? '' : 'none';
  if (tab === 'columns') requestAnimationFrame(updateColumnSignScale);
}

function updateColumnSign() {
  const r1  = document.getElementById('col-range1').value.trim();
  const r2  = document.getElementById('col-range2').value.trim();
  const cat = document.getElementById('col-cat').value.trim() || 'קטגוריה';
  const l1  = r1.charAt(0) || 'א';
  const l2  = r2.charAt(0) || 'ת';
  document.querySelectorAll('.col-sign-cat').forEach(el => { el.textContent = cat; });
  document.querySelectorAll('.col-sign-letter1').forEach(el => { el.textContent = l1; });
  document.querySelectorAll('.col-sign-letter2').forEach(el => { el.textContent = l2; });
}

function updateColumnSignScale() {
  const pane = document.getElementById('preview-columns');
  if (!pane || pane.style.display === 'none') return;
  const scaler = pane.querySelector('.col-sign-scaler');
  if (!scaler) return;
  const availW = pane.clientWidth - 48;
  const scale  = Math.min(1, availW / 1684);
  scaler.style.transform    = `scale(${scale})`;
  scaler.style.marginBottom = `${Math.round(1190 * scale - 1190)}px`;
}

async function saveColumnPDF() {
  const sign = document.getElementById('column-sign');
  const btn  = document.getElementById('btn-pdf');
  btn.textContent = '⏳ מכין...';
  btn.disabled    = true;
  try {
    const scaler = document.querySelector('.col-sign-scaler');
    const prev   = scaler.style.transform;
    scaler.style.transform = 'none';
    await document.fonts.ready;
    await new Promise(r => requestAnimationFrame(r));
    const canvas = await html2canvas(sign, {
      scale: 2, useCORS: true, allowTaint: true,
      backgroundColor: '#ffffff', logging: false,
      width: 1684, height: 1190,
    });
    scaler.style.transform = prev;
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const W = 297, H = 210;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const imgH    = (canvas.height / canvas.width) * W;
    pdf.addImage(imgData, 'JPEG', 0, Math.max(0, (H - imgH) / 2), W, Math.min(imgH, H));
    pdf.save('שלט-עמודות.pdf');
  } catch (e) {
    alert('שגיאה: ' + e.message);
  } finally {
    btn.textContent = '📄 שמור PDF';
    btn.disabled    = false;
  }
}

function handlePDF() {
  if (activeTab === 'age') savePDF();
  else saveColumnPDF();
}

function handlePrint() {
  if (activeTab === 'columns') {
    const s = document.createElement('style');
    s.textContent = '@page { size: A4 landscape; margin: 5mm; }';
    document.head.appendChild(s);
    window.print();
    s.remove();
  } else {
    window.print();
  }
}

// ===== CSV IMPORT =====
function importCSV() {
  const file = document.getElementById('csv-file').files[0];
  if (!file) { alert('בחרי/בחר קובץ CSV תחילה.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const dir = document.getElementById('csv-dir').value;
    parseCSV(e.target.result, dir);
  };
  reader.readAsText(file, 'utf-8');
}

function parseCSV(text, dir = 'rtl') {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return;

  // Detect header
  const headerLine = lines[0].toLowerCase();
  const hasSeries = headerLine.includes('series') || headerLine.includes('סדרה');
  const startIdx  = hasSeries ? 1 : 0;

  let added = 0;
  for (let i = startIdx; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (cols.length < 1) continue;
    const series   = (cols[0] || '').trim();
    const author   = (cols[1] || '').trim();
    const category = resolveCategory(cols[2] || 'אחר');
    if (series) { cards.push({ series, author, category, dir }); added++; }
  }
  render();
  if (added) alert(`יובאו ${added} כרטיסים.`);
}

function splitCSVLine(line) {
  // Simple CSV split supporting double-quoted fields
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

// ===== PAGINATION =====
// Measures actual rendered card positions to split into A4 pages
async function paginateCards() {
  const PAGE_H_MM = 277; // A4 297mm - 10mm top padding - 10mm bottom padding
  const MM_PX = 96 / 25.4;
  const pageHpx = PAGE_H_MM * MM_PX;

  const temp = document.createElement('div');
  Object.assign(temp.style, {
    position: 'fixed', visibility: 'hidden', top: '0', left: '0',
    width: '190mm', display: 'flex', flexWrap: 'wrap',
    columnGap: '4mm', rowGap: '6mm', alignContent: 'start',
  });
  temp.innerHTML = cards.map(buildCardHTML).join('');
  document.body.appendChild(temp);
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  const els = [...temp.querySelectorAll('.sign-card')];
  const pages = [[]];
  els.forEach((el, i) => {
    const pageIdx = pages.length - 1;
    const relBottom = el.offsetTop + el.offsetHeight - pageIdx * pageHpx;
    if (relBottom > pageHpx && pages[pageIdx].length > 0) {
      pages.push([cards[i]]);
    } else {
      pages[pageIdx].push(cards[i]);
    }
  });

  document.body.removeChild(temp);
  return pages;
}

// ===== RENDER =====
function scoreColor(hex) {
  // text color at ~30% opacity for score lines
  return hex + '4D';
}

function buildCardHTML(card) {
  const colors = COLORS[card.category] || COLORS['אחר'];
  const sc  = scoreColor(colors.text);
  const dir = card.dir || 'rtl';
  return `<div class="sign-card" style="background:${colors.bg};color:${colors.text};--sc:${sc};direction:${dir};">
  <div class="fold"></div>
  <div class="text-zone">
    <span class="series-name">${escHtml(card.series)}</span><span class="separator"> | </span><span class="author-name">${escHtml(card.author || '')}</span>
  </div>
  <div class="fold"></div>
</div>`;
}


function render() {
  // Update count
  document.getElementById('count').textContent = cards.length;

  // Update sidebar card list
  const list = document.getElementById('card-list');
  if (!cards.length) {
    list.innerHTML = '<div class="empty-hint">עדיין אין כרטיסים.<br/>הוסף למעלה או ייבא CSV.</div>';
  } else {
    list.innerHTML = cards.map((c, i) => {
      const col = (COLORS[c.category] || COLORS['אחר']).bg;
      return `<div class="card-list-item">
        <span class="card-list-dot" style="background:${col}"></span>
        <span class="card-list-text">
          <span class="card-list-series">${escHtml(c.series)}</span>
          ${c.author ? `<span class="card-list-author"> — ${escHtml(c.author)}</span>` : ''}
          ${c.dir === 'ltr' ? '<span class="card-list-author"> · EN</span>' : ''}
        </span>
        <button class="btn-edit" title="ערוך" onclick="editCard(${i})">✎</button>
        <button class="btn-del" title="מחק" onclick="removeCard(${i})">✕</button>
      </div>`;
    }).join('');
  }

  // Update preview pages
  const pane = document.getElementById('preview-pane');
  if (!cards.length) {
    pane.innerHTML = `<div style="color:#ddd;font-size:1.2rem;margin-top:80px;text-align:center;">הוסף כרטיסים כדי לראות תצוגה מקדימה</div>`;
    return;
  }

  paginateCards().then(pages => {
    pane.innerHTML = pages.map(pageCards =>
      `<div class="a4-page">${pageCards.map(buildCardHTML).join('\n')}</div>`
    ).join('\n');
  });
}

// ===== CSV TEMPLATE =====
function downloadCSVTemplate() {
  const rows = [
    'series,author,category',
    'הארי פוטר,ג\'יי.קיי. רולינג,נוער',
    'ארנב שרוצה לישון,קרל-יוהן פורסן ארלין,גיל רך',
    'שם הסדרה,שם המחבר/ת,ילדים',
    ',,מבוגרות/ים',
  ];
  const blob = new Blob(['\uFEFF' + rows.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'תבנית-כרטיסי-ספרייה.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== PDF EXPORT =====
async function savePDF() {
  const pages = document.querySelectorAll('.a4-page');
  if (!pages.length) { alert('אין כרטיסים להורדה'); return; }

  const btn = document.getElementById('btn-pdf');
  btn.textContent = '⏳ מכין...';
  btn.disabled = true;

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const A4_W = 210, A4_H = 297;

    for (let i = 0; i < pages.length; i++) {
      const canvas = await html2canvas(pages[i], {
        scale: 3,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        logging: false,
      });
      if (i > 0) pdf.addPage();
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const imgH = (canvas.height / canvas.width) * A4_W;
      pdf.addImage(imgData, 'JPEG', 0, 0, A4_W, Math.min(imgH, A4_H));
    }

    pdf.save('כרטיסי-ספרייה.pdf');
  } catch (e) {
    alert('שגיאה ביצירת PDF: ' + e.message);
  } finally {
    btn.textContent = '📄 שמור PDF';
    btn.disabled = false;
  }
}

// ===== KEYBOARD SHORTCUT =====
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') addCard();
});

// ===== INIT =====
document.body.dataset.tab = 'age';
render();
updateColumnSign();

document.getElementById('col-range1').addEventListener('input', updateColumnSign);
document.getElementById('col-range2').addEventListener('input', updateColumnSign);
document.getElementById('col-cat').addEventListener('input', updateColumnSign);

const _colPane = document.getElementById('preview-columns');
if (_colPane && window.ResizeObserver) {
  new ResizeObserver(updateColumnSignScale).observe(_colPane);
}
</script>
